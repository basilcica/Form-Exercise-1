<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/style.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
</head>
<body>
    <form>

        <!-- heading -->

        <h1>Login form</h1>

        <!-- main form wrapper -->
         <div>
            <!-- mobile or image input -->
             <div class="input-group">
                <i class="bi bi-person-rolodex"></i>
             <input type="text" 
             placeholder= "Mobile/Email">
             </div>


             <div class="input-group">
                <i class="bi bi-lock-fill"></i>

             <input type="password"
             placeholder="Password">
             </div>

             <a href="#">Forgot Password?</a>
         </div>
        <!-- other login option -->
         <button type="submit" class="login-btn"> LOGIN</button>
         <div>
            <p>or login with</p>
            <div class="social-buttons">
            <button class="twitter-btn" href="https://x.com/oauth/authorize" target="_blank"><i class="bi bi-twitter-x">  Twitter</i></button>
            <button class="instagram-btn" href="https://www.instagram.com/accounts/login/?hl=en" target="_black"><i class="bi bi-instagram"></i>  Instagram</button>
            </div>
             <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>


         </div>

         <!-- sign up section -->
          <p>Don't have an account <a href="#">Sign up now</a></p>




    </form>

</body>
</html>
